<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FFFBF5" />
    <title>Nuestro Diario en el Tiempo</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              background: '#FFFBF5', // Soft Cream
              foreground: '#2C2C2C', // Charcoal
              card: '#FFFFFF',
              'card-foreground': '#2C2C2C',
              popover: '#FFFFFF',
              'popover-foreground': '#2C2C2C',
              primary: '#333333', // Dark Charcoal
              'primary-foreground': '#F5F5F5',
              secondary: '#F1EBE4', // Lighter Cream
              'secondary-foreground': '#333333',
              muted: '#D6CFCB', // Muted Taupe
              'muted-foreground': '#5A5A5A',
              accent: '#D94686', // Vibrant Magenta
              'accent-foreground': '#FFFFFF', // White for better contrast on vibrant bg
              destructive: '#E57373',
              border: '#EAE1D9', // Soft Border
              input: '#EAE1D9',
              ring: '#E57FAB', // Lighter Vibrant Magenta for focus rings
            },
             borderRadius: {
              lg: "0.75rem",
              md: "0.5rem",
              sm: "0.375rem",
            },
            boxShadow: {
              premium: '0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04)',
            },
            keyframes: {
              shake: {
                '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                '40%, 60%': { transform: 'translate3d(4px, 0, 0)' },
              },
              slideInUp: {
                '0%': { opacity: '0', transform: 'translateY(2rem)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeOut: {
                '0%': { opacity: '1' },
                '100%': { opacity: '0', visibility: 'hidden' },
              },
              scaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              heartbeat: {
                '0%': { transform: 'scale(1)' },
                '14%': { transform: 'scale(1.3)' },
                '28%': { transform: 'scale(1)' },
                '42%': { transform: 'scale(1.3)' },
                '70%': { transform: 'scale(1)' },
              },
            },
            animation: {
              shake: 'shake 0.82s cubic-bezier(.36,.07,.19,.97) both',
              slideInUp: 'slideInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              fadeOut: 'fadeOut 1.2s ease-in-out forwards',
              scaleIn: 'scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              heartbeat: 'heartbeat 1s ease-in-out',
            },
          },
        },
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.2",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "date-fns/": "https://aistudiocdn.com/date-fns@^4.1.0/",
    "date-fns": "https://aistudiocdn.com/date-fns@^4.1.0",
    "@vercel/blob/client": "https://aistudiocdn.com/@vercel/blob@^0.23.4/dist/client.js",
    "@vercel/blob/": "https://aistudiocdn.com/@vercel/blob@^2.0.0/",
    "@vercel/blob": "https://aistudiocdn.com/@vercel/blob@^2.0.0",
    "@vercel/postgres": "https://aistudiocdn.com/@vercel/postgres@^0.10.0"
  }
}
</script>
</head>
  <body class="bg-background text-foreground font-sans">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
