<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FFFBF5" />
    <title>Nuestro Diario en el Tiempo</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --background: 30 50% 98%; /* Soft Cream: #FFFBF5 */
        --foreground: 0 0% 17%; /* Charcoal: #2C2C2C */
        --card: 0 0% 100%; /* White */
        --card-foreground: 0 0% 17%;
        --popover: 0 0% 100%;
        --popover-foreground: 0 0% 17%;
        --primary: 0 0% 20%; /* Dark Charcoal: #333333 */
        --primary-foreground: 0 0% 96%; /* Off-white: #F5F5F5 */
        --secondary: 25 33% 95%; /* Lighter Cream: #F1EBE4 */
        --secondary-foreground: 0 0% 20%;
        --muted: 25 15% 85%; /* Muted Taupe: #D6CFCB */
        --muted-foreground: 0 0% 35%; /* #5A5A5A */
        --accent: 332 68% 56%; /* Vibrant Magenta: #D94686 */
        --accent-foreground: 0 0% 100%;
        --destructive: 0 72% 67%; /* #E57373 */
        --border: 26 33% 92%; /* Soft Border: #EAE1D9 */
        --input: 26 33% 92%;
        --ring: 329 74% 83%; /* Lighter Magenta: #E57FAB */
      }
      .dark {
        --background: 224 10% 10%; /* Dark Slate Gray */
        --foreground: 210 20% 90%; /* Light Grayish Blue */
        --card: 224 10% 13%;
        --card-foreground: 210 20% 90%;
        --popover: 224 10% 10%;
        --popover-foreground: 210 20% 90%;
        --primary: 210 20% 90%;
        --primary-foreground: 224 10% 10%;
        --secondary: 224 10% 18%; /* Slightly lighter gray */
        --secondary-foreground: 210 20% 90%;
        --muted: 224 10% 25%;
        --muted-foreground: 210 20% 70%;
        --accent: 332 70% 65%; /* #E0689C */
        --accent-foreground: 0 0% 10%;
        --destructive: 0 63% 51%;
        --border: 224 10% 20%;
        --input: 224 10% 20%;
        --ring: 332 70% 65%;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              background: 'hsl(var(--background))',
              foreground: 'hsl(var(--foreground))',
              card: 'hsl(var(--card))',
              'card-foreground': 'hsl(var(--card-foreground))',
              popover: 'hsl(var(--popover))',
              'popover-foreground': 'hsl(var(--popover-foreground))',
              primary: 'hsl(var(--primary))',
              'primary-foreground': 'hsl(var(--primary-foreground))',
              secondary: 'hsl(var(--secondary))',
              'secondary-foreground': 'hsl(var(--secondary-foreground))',
              muted: 'hsl(var(--muted))',
              'muted-foreground': 'hsl(var(--muted-foreground))',
              accent: 'hsl(var(--accent))',
              'accent-foreground': 'hsl(var(--accent-foreground))',
              destructive: 'hsl(var(--destructive))',
              border: 'hsl(var(--border))',
              input: 'hsl(var(--input))',
              ring: 'hsl(var(--ring))',
            },
             borderRadius: {
              lg: "0.75rem",
              md: "0.5rem",
              sm: "0.375rem",
            },
            boxShadow: {
              premium: '0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04)',
            },
            keyframes: {
              shake: {
                '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                '40%, 60%': { transform: 'translate3d(4px, 0, 0)' },
              },
              slideInUp: {
                '0%': { opacity: '0', transform: 'translateY(2rem)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeOut: {
                '0%': { opacity: '1' },
                '100%': { opacity: '0', visibility: 'hidden' },
              },
              scaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              heartbeat: {
                '0%': { transform: 'scale(1)' },
                '14%': { transform: 'scale(1.3)' },
                '28%': { transform: 'scale(1)' },
                '42%': { transform: 'scale(1.3)' },
                '70%': { transform: 'scale(1)' },
              },
              pulse: {
                '50%': { opacity: '.5' },
              },
              // Animación para el fondo del easter egg
              fadeInBg: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeOutBg: {
                '0%': { opacity: '1' },
                '100%': { opacity: '0' },
              },
              // Animación mejorada para la flor
              bloomIn: {
                '0%': { transform: 'scale(0) rotate(-45deg)', opacity: '0' },
                '70%': { transform: 'scale(1.1) rotate(5deg)', opacity: '1' },
                '100%': { transform: 'scale(1) rotate(0deg)', opacity: '1' },
              },
              bloomOut: {
                '0%': { transform: 'scale(1) rotate(0deg)', opacity: '1' },
                '100%': { transform: 'scale(0.3) rotate(15deg)', opacity: '0' },
              }
            },
            animation: {
              shake: 'shake 0.82s cubic-bezier(.36,.07,.19,.97) both',
              slideInUp: 'slideInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              fadeOut: 'fadeOut 1.2s ease-in-out forwards',
              scaleIn: 'scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              heartbeat: 'heartbeat 1s ease-in-out',
              pulse: 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              // Animaciones para el easter egg
              fadeInBg: 'fadeInBg 0.5s ease-out forwards',
              fadeOutBg: 'fadeOutBg 1s ease-in forwards',
              bloomIn: 'bloomIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
              bloomOut: 'bloomOut 1s ease-in-out forwards',
            },
          },
        },
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.2",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "date-fns/": "https://aistudiocdn.com/date-fns@^4.1.0/",
    "date-fns": "https://aistudiocdn.com/date-fns@^4.1.0",
    "@vercel/blob/client": "https://aistudiocdn.com/@vercel/blob@^0.23.4/dist/client.js",
    "@vercel/blob/": "https://aistudiocdn.com/@vercel/blob@^2.0.0/",
    "@vercel/blob": "https://aistudiocdn.com/@vercel/blob@^2.0.0",
    "@vercel/postgres": "https://aistudiocdn.com/@vercel/postgres@^0.10.0"
  }
}
</script>
</head>
  <body class="bg-background text-foreground font-sans">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
